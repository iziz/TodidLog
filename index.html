<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>TodidLog</title>
    <link rel="manifest" href="./manifest.webmanifest?v=211" />
    <link rel="stylesheet" href="./styles.css?v=211" />
  </head>
  <body>
    <section class="auth-shell" id="authShell" aria-label="Authentication">
      <div class="auth-panel">
        <div class="auth-brand">
          <p class="section-kicker">TodidLog</p>
          <h1>Sign in</h1>
        </div>

        <form class="auth-form" id="authLoginForm">
          <label>
            Username
            <input id="authLoginUsername" type="text" autocomplete="username" minlength="3" maxlength="40" required />
          </label>
          <label>
            Password
            <input id="authLoginPassword" type="password" autocomplete="current-password" minlength="8" required />
          </label>
          <p class="form-error" id="authLoginError" role="alert"></p>
          <button class="button primary" type="submit">Sign in</button>
        </form>

        <form class="auth-form" id="authRegisterForm" hidden>
          <label>
            Username
            <input id="authRegisterUsername" type="text" autocomplete="username" minlength="3" maxlength="40" required />
          </label>
          <label>
            Password
            <input id="authRegisterPassword" type="password" autocomplete="new-password" minlength="8" required />
          </label>
          <label id="authRegisterTokenBlock">
            Registration token
            <input id="authRegistrationToken" type="password" autocomplete="off" />
          </label>
          <p class="form-error" id="authRegisterError" role="alert"></p>
          <button class="button primary" type="submit">Create account</button>
        </form>

        <div class="auth-switch">
          <button class="today-link" id="authRegisterToggle" type="button">Create account</button>
          <button class="today-link" id="authLoginToggle" type="button" hidden>Back to sign in</button>
        </div>
      </div>
    </section>

    <main class="app-shell" id="appShell" hidden>
      <section class="planner" aria-label="Work log">
        <header class="planner-header">
          <div class="header-date-block">
            <p class="date-label" id="selectedDateLabel"></p>
            <button class="today-link" id="goTodayBtn" type="button" aria-label="Go to today">Today</button>
          </div>
          <div class="header-actions">
            <span class="auth-user-label" id="authUserLabel"></span>
            <button class="header-settings-button" id="openFortuneSettingsBtn" type="button" aria-label="Fortune settings">⚙</button>
          </div>
        </header>

        <section class="calendar-surface" id="calendarSurface" aria-label="Date picker">
          <div class="calendar-action-row">
            <div class="calendar-pager">
              <button class="icon-button calendar-arrow" id="prevCalendarBtn" type="button" aria-label="Previous week">‹</button>
              <strong class="calendar-context-title" id="calendarContextTitle"></strong>
              <button class="icon-button calendar-arrow" id="nextCalendarBtn" type="button" aria-label="Next week">›</button>
            </div>
            <button class="calendar-toggle" id="calendarToggleBtn" type="button" aria-expanded="false" aria-controls="monthInline">Month</button>
          </div>
          <div class="calendar-body" id="calendarBody">
            <div class="calendar-weekdays" id="calendarWeekdays" aria-hidden="true">
              <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
            </div>
            <div class="calendar-view-stack">
              <div class="week-nav" id="weekNav">
                <nav class="week-strip" id="weekStrip" aria-label="Weekly dates"></nav>
              </div>
              <div class="month-inline calendar-view-hidden" id="monthInline" aria-hidden="true">
                <div class="month-grid" id="monthGrid"></div>
              </div>
            </div>
          </div>
          <div class="calendar-footer">
            <button class="report-button hidden" id="monthReportBtn" type="button" aria-label="Copy monthly report">
              <span class="report-button-icon" aria-hidden="true"></span>
              <span class="report-button-label">Report</span>
            </button>
            <p class="context-total calendar-total"><span id="calendarTotalLabel">Week</span><strong id="calendarTotalValue">0m</strong></p>
          </div>
          <div class="fortune-summary section-divider hidden" id="fortuneSummary"></div>
        </section>

        <section class="timer-card section-divider" aria-label="Timer">
          <div>
            <p class="section-kicker">Timer</p>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <p class="timer-status" id="timerStatus">Ready</p>
          </div>
          <div class="timer-actions">
            <button class="timer-icon-button" id="startTimerBtn" type="button" aria-label="Start timer">
              <img src="./assets/timer_start.png" alt="" aria-hidden="true" />
            </button>
            <button class="timer-icon-button hidden" id="stopTimerBtn" type="button" aria-label="Stop timer">
              <img src="./assets/timer_stop.png" alt="" aria-hidden="true" />
            </button>
          </div>
        </section>

        <section class="task-section" aria-label="Daily tasks">
          <div class="section-title-row">
            <div>
              <p class="section-kicker">Tasks</p>
            </div>
            <div class="selection-actions">
              <span id="selectionCount">0 selected</span>
              <button class="selection-button hidden" id="groupSelectedBtn" type="button" aria-label="Merge selected tasks">Merge</button>
              <button class="selection-button danger-action hidden" id="deleteSelectedBtn" type="button" aria-label="Delete selected tasks">Delete</button>
            </div>
          </div>
          <div class="task-timeline">
            <button class="floating-add" id="openQuickModalBtn" type="button" aria-label="Add task">
              <img src="https://cdn-icons-png.magnific.com/512/3914/3914248.png?ga=GA1.1.1425901958.1778341385" alt="" aria-hidden="true" />
            </button>
            <div class="task-list" id="taskList"></div>
          </div>
          <p class="empty-message hidden" id="emptyMessage">No more tasks today!</p>
          <p class="context-total daily-total"><span>Today</span><strong id="dailyTotal">0m</strong></p>
        </section>
      </section>

    </main>

    <dialog class="record-modal" id="recordModal">
      <form method="dialog" class="modal-card" id="recordForm">
        <div class="modal-header">
          <div>
            <p class="section-kicker" id="modalKicker">Record</p>
            <input class="modal-title-input" id="recordTitle" type="text" placeholder="Title" aria-label="Title" />
          </div>
          <button class="icon-button" id="closeModalBtn" type="button" aria-label="Close">×</button>
        </div>

        <div class="modal-time" id="modalTime"></div>
        <div class="modal-time-row" id="modalTimeEditor">
          <label>
            Start
            <input id="recordStart" type="text" inputmode="numeric" autocomplete="off" maxlength="5" placeholder="00:00" />
          </label>
          <label>
            End
            <input id="recordEnd" type="text" inputmode="numeric" autocomplete="off" maxlength="5" placeholder="00:00" />
          </label>
        </div>

        <div class="field-block">
          <label for="recordTags">Tags</label>
          <input id="recordTags" type="text" placeholder="Type a tag and press Enter" />
          <div class="tag-chip-list" id="recordTagChips" aria-label="Tag list"></div>
        </div>
        <div class="field-block details-field">
          <label id="recordDetailsLabel">Details</label>
          <div class="details-editor-shell">
            <div class="details-editor-toolbar" id="recordDetailsToolbar" aria-label="Details formatting">
              <button class="editor-tool" type="button" data-editor-command="bold" aria-label="Bold" title="Bold"><b>B</b></button>
              <button class="editor-tool" type="button" data-editor-command="italic" aria-label="Italic" title="Italic"><i>I</i></button>
              <button class="editor-tool" type="button" data-editor-command="link" aria-label="Link" title="Link">Link</button>
              <button class="editor-tool" type="button" data-editor-command="bulletList" aria-label="Bullet list" title="Bullet list">•</button>
              <button class="editor-tool" type="button" data-editor-command="orderedList" aria-label="Ordered list" title="Ordered list">1.</button>
            </div>
            <div class="record-details-editor" id="recordDetailsEditor" role="textbox" aria-labelledby="recordDetailsLabel"></div>
          </div>
        </div>
        <p class="form-error" id="modalError" role="alert"></p>
        <div class="modal-actions">
          <button class="button danger hidden" id="deleteRecordBtn" type="button">Delete</button>
          <button class="button primary" id="saveRecordBtn" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog class="record-modal" id="fortuneSettingsModal">
      <form method="dialog" class="modal-card" id="fortuneSettingsForm">
        <div class="modal-header">
          <div>
            <p class="section-kicker">Profile</p>
            <div class="settings-identity">
              <h2 class="settings-title" id="fortuneSettingsTitle">
                <span class="settings-title-user" id="fortuneSettingsUser">User</span>
              </h2>
              <button class="settings-logout-button" id="logoutBtn" type="button">Logout</button>
            </div>
          </div>
          <button class="icon-button settings-close-button" id="closeFortuneSettingsBtn" type="button" aria-label="Close">×</button>
        </div>

        <div class="settings-profile-fields">
          <label class="settings-field">
            <span class="settings-field-icon icon-calendar" aria-hidden="true"></span>
            <span class="settings-field-body">
              <span class="settings-field-label">Birth date</span>
              <input id="fortuneBirthDate" type="date" />
            </span>
          </label>
          <div class="field-row settings-field-row">
            <label class="settings-field">
              <span class="settings-field-icon icon-clock" aria-hidden="true"></span>
              <span class="settings-field-body">
                <span class="settings-field-label">Birth time</span>
                <input id="fortuneBirthTime" type="time" />
                <span class="inline-check nested-check">
                  <input id="fortuneUnknownTime" type="checkbox" />
                  Unknown time
                </span>
              </span>
            </label>
            <label class="settings-field">
              <span class="settings-field-icon icon-person" aria-hidden="true"></span>
              <span class="settings-field-body">
                <span class="settings-field-label">Gender</span>
                <select id="fortuneGender">
                  <option value="M">Male</option>
                  <option value="F">Female</option>
                </select>
              </span>
            </label>
          </div>
          <label class="settings-field">
            <span class="settings-field-icon icon-pin" aria-hidden="true"></span>
            <span class="settings-field-body">
              <span class="settings-field-label">Birthplace <span class="label-note">Optional</span></span>
              <input id="fortuneBirthplace" type="text" list="fortuneBirthplaceOptions" placeholder="Seoul, Busan, Tokyo" autocomplete="off" />
              <datalist id="fortuneBirthplaceOptions"></datalist>
            </span>
          </label>
          <div class="fortune-settings-chart hidden" id="fortuneNatalPreview"></div>
          <label class="settings-field">
            <span class="settings-field-icon icon-language" aria-hidden="true"></span>
            <span class="settings-field-body">
              <span class="settings-field-label">Fortune language</span>
              <select id="fortuneLanguage">
                <option value="en">English</option>
                <option value="ko">Korean</option>
              </select>
            </span>
          </label>
        </div>
        <p class="form-error" id="fortuneSettingsError" role="alert"></p>
        <div class="modal-actions settings-actions">
          <button class="button danger hidden" id="deleteFortuneProfileBtn" type="button">Delete</button>
          <button class="button primary" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <script src="./vendor/app.js?v=211" type="module"></script>
  </body>
</html>
